<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="kg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#kg)"/>
  <!-- Calibration dial: outer ring + tick marks -->
  <circle cx="100" cy="100" r="58" stroke="white" stroke-width="5" fill="none" opacity="0.95"/>
  <g stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="100" y1="50"  x2="100" y2="58"/>
    <line x1="150" y1="100" x2="142" y2="100"/>
    <line x1="100" y1="150" x2="100" y2="142"/>
    <line x1="50"  y1="100" x2="58"  y2="100"/>
    <line x1="135.4" y1="64.6" x2="130.3" y2="69.7" opacity="0.55"/>
    <line x1="135.4" y1="135.4" x2="130.3" y2="130.3" opacity="0.55"/>
    <line x1="64.6"  y1="135.4" x2="69.7"  y2="130.3" opacity="0.55"/>
    <line x1="64.6"  y1="64.6"  x2="69.7"  y2="69.7"  opacity="0.55"/>
  </g>
  <!-- Pointer needle -->
  <line x1="100" y1="100" x2="128" y2="82" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="6" fill="white"/>
  <!-- Small check badge (indicates "verified / calibrated") -->
  <circle cx="150" cy="150" r="18" fill="white" opacity="0.95"/>
  <path d="M142 150 L148 156 L158 144" stroke="#6d28d9" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
